version: 2
updates:
  # Root package.json
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    allow:
      - dependency-type: "direct"
    # Ignore major updates for heavy puppeteer
    ignore:
      - dependency-name: "puppeteer"
        update-types: ["version-update:semver-major"]

  # Main CLI (ponysay-node)
  - package-ecosystem: "npm"
    directory: "/ponysay-node"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-name: "puppeteer"
        update-types: ["version-update:semver-major"]

  # GitHub Actions security (very low noise)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
