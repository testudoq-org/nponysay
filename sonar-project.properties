# =============================================
# SonarCloud Configuration for nponysay
# =============================================

sonar.projectKey=testudoq-org_nponysay
sonar.organization=testudoq-org

# Project metadata
sonar.projectName=nponysay
sonar.projectVersion=1.0

# === SOURCE CODE ===
# Only scan the actual JavaScript source (ponysay-node/src)
sonar.sources=ponysay-node/src

# === EXCLUSIONS ===
# Exclude pony ASCII art files + everything that is not real source code
sonar.exclusions=**/*.pony,**/assets/**,**/node_modules/**,**/coverage/**,**/memory-bank/**,**/scripts/**,**/__tests__/**

# === TEST FILES ===
sonar.tests=ponysay-node/src/__tests__

# === COVERAGE REPORTS ===
# Point to the coverage files generated by your tests
sonar.javascript.lcov.reportPaths=coverage/lcov.info,ponysay-node/coverage/lcov.info

# === MISC SETTINGS ===
sonar.sourceEncoding=UTF-8

# Optional: Force JS language (helps with .mjs files)
sonar.language=js
