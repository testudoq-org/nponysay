# =============================================
# SonarCloud Configuration for nponysay
# =============================================

sonar.projectKey=testudoq-org_nponysay
sonar.organization=testudoq-org

# Project metadata
sonar.projectName=nponysay
sonar.projectVersion=1.0

# Source code settings
sonar.sources=ponysay-node
sonar.exclusions=**/__tests__/**,**/*.test.js,**/*.spec.js,**/node_modules/**,**/coverage/**

# Test files (optional but recommended)
sonar.tests=.
sonar.test.inclusions=**/__tests__/**,**/*.test.js,**/*.spec.js

# Coverage report (very important for good SonarCloud scores)
sonar.javascript.lcov.reportPaths=coverage/lcov.info,ponysay-node/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# JavaScript / Node.js specific
sonar.language=js
