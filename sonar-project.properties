# =============================================
# SonarCloud Configuration for nponysay
# =============================================

sonar.projectKey=testudoq-org_nponysay
sonar.organization=testudoq-org

sonar.projectName=nponysay
sonar.projectVersion=1.0

# === SOURCE CODE - ONLY JavaScript / Node.js part ===
sonar.sources=ponysay-node/src

# === EXCLUSIONS - Keep everything else out ===
sonar.exclusions=**/*.pony,**/*.md,**/*.txt,**/assets/**,**/memory-bank/**,**/scripts/**,**/node_modules/**,**/coverage/**,**/__tests__/**,*.png,*.jpg,*.gif,.github/**

# === TEST FILES ===
sonar.tests=ponysay-node/src/__tests__

# === COVERAGE REPORTS ===
sonar.javascript.lcov.reportPaths=coverage/lcov.info,ponysay-node/coverage/lcov.info

# === LANGUAGE & ENCODING ===
sonar.sourceEncoding=UTF-8
sonar.language=js

# Optional: Explicitly include .mjs files (helps reliability)
sonar.javascript.file.suffixes=.js,.mjs
